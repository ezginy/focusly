<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Focusly</title>

    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/components.css">
</head>

<body>
    
    <div class="app">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo">
                <h1>Focusly</h1>
            </div> 

            <nav class="nav-menu">
                <a href="#" class="nav-item active"> Dashboard </a>

                <a href="#" class="nav-item"> Focus Timer </a>
                <a href="#" class="nav-item"> Tasks </a>
                <a href="#" class="nav-item"> Analytics </a>
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">

            <!-- HEADER -->
            <header class="top-header">
                <h2> Dashboard </h2>
                <p> Track your productivity and stay focused. </p>
            </header>

            <!-- DASHBOARD CARDS -->
            <section class="dashboard-grid">
                <div class="card">
                    <h3> Today's Focus </h3>
                    <p> 2h 15m </p>
                </div>

                <div class="card">
                    <h3> Completed Tasks </h3>
                    <p> 8 </p>
                </div>

                <div class="card">
                    <h3> Current Streak </h3>
                    <p> 5 Days </p>
                </div>

            </section>

            <!-- TIMER SECTION -->
            <section class="focus-section card"> 
                <h3> Focus Timer </h3>
            </section>
            
            <!-- TASK SECTION -->
            <section class="tasks-section card">
                <h3> Tasks </h3> 
            </section>

        </main>
    </div>

    <script src="./js/app.js"></script>
</body>
</html>
