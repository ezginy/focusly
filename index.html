<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Focusly</title>

    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/components.css">
</head>

<body>
    
    <div class="app">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="logo">
                <h1>Focusly</h1>
            </div> 

            <nav class="nav-menu">
                <a href="#" class="nav-item active"> Dashboard </a>

                <a href="#" class="nav-item"> Focus Timer </a>
                <a href="#" class="nav-item"> Tasks </a>
                <a href="#" class="nav-item"> Analytics </a>
            </nav>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">

            <!-- HEADER -->
            <header class="top-header">
                <h2> Dashboard </h2>
                <p> Track your productivity and stay focused. </p>
            </header>

            <!-- PRODUCTIVITY STATS -->
            <section class="dashboard-grid">
                <div class="card">
                    <h3> Today's Focus </h3>
                    <p> 2h 15m </p>
                </div>

                <div class="card">
                    <h3> Completed Tasks </h3>
                    <p class="completed-count"> 0 </p>
                </div>

                <div class="card">
                    <h3> Current Streak </h3>
                    <p class="total-count"> 0 </p>
                </div>

            </section>

            <!-- TIMER SECTION -->
            <section class="focus-section card"> 
                
                <div class="section-header">
                    
                    <h3> Focus Timer </h3>

                    <!-- TIMER BUTTONS -->
                    <div class="timer-buttons">
                        <button class="primary-btn" type="button"> Start Session </button>
                        <button class="reset-btn" type="button"> Reset </button>
                    </div>
                
                </div>

                <!-- TIMER MODES -->
                <div class="timer-modes">
                    <button class="mode-btn active-mode"> Pomodoro </button>
                    
                    <button class="mode-btn"> Short Break </button>
                    <button class="mode-btn"> Long Break </button>
                </div>
                
                <div class="timer-display"> 25:00 </div>
            
            </section>
            
            <!-- TASK SECTION -->
            <section class="tasks-section card">

                <div class="section-header">
                    <h3> Tasks </h3> 
                </div>

                <!-- TASK FORM -->
                <form class="task-form">
                    <input type="text" class="task-input" placeholder="Add a new task...">

                    <button class="primary-btn" type="submit"> Add Task </button>
                </form>

                <!-- TASK LIST -->
                <div class="task-list">
                    <div class="task-placeholder"> No tasks added yet. </div>
                </div>

            </section>

        </main>
    </div>

    <script src="./js/app.js"></script>
</body>
</html>
